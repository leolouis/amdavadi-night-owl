<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amdavadi Night Owl | Cyberpunk Map</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { background-color: #0f172a; color: #38bdf8; font-family: 'Space Grotesk', sans-serif; }
        #map { height: 85vh; border: 2px solid #38bdf8; }
        .leaflet-popup-content { color: #000; }
    </style>
</head>
<body class="p-4">
    <header class="mb-4">
        <h1 class="text-3xl font-bold text-white">🦉 Amdavadi Night Owl</h1>
        <div class="mt-2 flex gap-2">
            <button onclick="updateMap('all')" class="bg-blue-900 px-4 py-1 rounded border border-blue-500">Show All</button>
            <button onclick="updateMap('Tea')" class="bg-blue-900 px-4 py-1 rounded border border-blue-500">Tea Kitlis</button>
            <button onclick="updateMap('Food')" class="bg-blue-900 px-4 py-1 rounded border border-blue-500">Food Spots</button>
        </div>
    </header>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map').setView([23.0225, 72.5714], 13);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { attribution: '© OpenStreetMap' }).addTo(map);

        let markers = [];
        
        fetch('data/places.json')
            .then(res => res.json())
            .then(data => {
                data.forEach(p => {
                    const m = L.marker([p.lat, p.lng]).addTo(map).bindPopup(`<b>${p.name}</b><br>${p.description}`);
                    markers.push({ m, cat: p.category });
                });
            });

        function updateMap(cat) {
            markers.forEach(item => {
                cat === 'all' || item.cat === cat ? item.m.addTo(map) : map.removeLayer(item.m);
            });
        }
    </script>
</body>
</html>
