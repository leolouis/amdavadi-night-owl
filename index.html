<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Amdavadi Night Owl</title>

    <meta name="description"
          content="Find Ahmedabad's best midnight food trucks, tea kitlis and hangout spots.">

    <link rel="icon"
          href="assets/images/favicon.png">

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Leaflet -->

    <link
        rel="stylesheet"
        href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- Google Font -->

    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- Confetti -->

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

    <link rel="stylesheet"
          href="css/style.css">

</head>

<body>

    <!-- Loading Screen -->

    <div id="loading-screen">

        <h1>🦉</h1>
        <h2>Amdavadi Night Owl</h2>

    </div>

    <!-- Header -->

    <header>

        <h1>🦉 Amdavadi Night Owl</h1>

        <p>
            Ahmedabad After Dark
        </p>

    </header>

    <!-- Alerts -->

    <div id="alerts"></div>

    <!-- Search -->

    <section id="search-section">

        <input
            type="text"
            id="searchInput"
            placeholder="Search for Kitlis, Cafes or Food Trucks">

    </section>

    <!-- Filters -->

    <section id="filters">

        <button class="filter active">All</button>

        <button class="filter">Tea</button>

        <button class="filter">Food</button>

        <button class="filter">Cafe</button>

        <button class="filter">Dessert</button>

    </section>

    <!-- Map -->

    <div id="map"></div>

    <!-- Floating Buttons -->

    <div id="floating-buttons">

        <button id="locateBtn">
            📍
        </button>

        <button id="rouletteBtn">
            🎲
        </button>

        <button id="addSpotBtn">
            ➕
        </button>

        <button id="inviteBtn">
            💬
        </button>

    </div>

    <!-- Bottom Sheet -->

    <div id="bottom-sheet">

    </div>

    <script src="config.js"></script>

    <script src="js/app.js" type="module"></script>

</body>

</html>
